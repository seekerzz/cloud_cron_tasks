<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史日报归档 - 科技日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .archive-list {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .archive-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .archive-item:last-child {
            border-bottom: none;
        }
        .archive-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .archive-item a:hover {
            text-decoration: underline;
        }
        .date {
            color: #999;
            font-size: 14px;
        }
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        .back-link a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 历史日报归档</h1>
        </header>
        <div class="archive-list">
            <div class="archive-item">
                <a href="20260328/">2026年03月28日</a>
                <span class="date">昨天</span>
            </div>
        </div>
        <div class="back-link">
            <a href="../">← 返回今日日报</a>
        </div>
    </div>
</body>
</html>
