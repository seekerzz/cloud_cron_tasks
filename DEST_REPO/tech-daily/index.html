<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>科技日报 - 多角色视角</title>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .date {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .versions {
            display: grid;
            gap: 20px;
        }
        .version-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #667eea;
        }
        .version-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .version-card h2 {
            margin-bottom: 8px;
            font-size: 1.3em;
        }
        .version-card a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
        }
        .version-card a:hover {
            text-decoration: underline;
        }
        .version-card p {
            color: #666;
            margin-top: 8px;
            font-size: 0.95em;
        }
        .archive {
            margin-top: 40px;
            text-align: center;
        }
        .archive a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border: 2px solid #764ba2;
            border-radius: 25px;
            display: inline-block;
            transition: all 0.2s;
        }
        .archive a:hover {
            background: #764ba2;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
<h1>📰 科技日报</h1>
<div class="versions">
<div class="version-card">
<h2>🎯 CTO洞察版</h2>
<a href="cto_insight.html">查看日报</a>

</div>
<div class="version-card">

<a href="developer_practice.html">查看日报</a>
<p>面向程序员，关注技术细节与工具实践</p>
</div>
<div class="version-card">
<h2>🚀 科技爱好者版</h2>
<a href="tech_enthusiast.html">查看日报</a>
<p>通俗科普，关注生活影响与趣味性</p>
</div>
<div class="version-card">
<h2>📈 投资分析版</h2>
<a href="investment_analysis.html">查看日报</a>
<p>面向投资者，关注市场机会与风险评估</p>
</div>
<div class="version-card">
<h2>🎓 学术研究员版</h2>
<a href="academic_research.html">查看日报</a>
<p>面向研究人员，关注学术创新与理论基础</p>
</div>
<div class="version-card">
<h2>🎨 用户研究版</h2>

<p>面向UX设计师与研究员，关注用户体验与设计趋势</p>
</div>
</div>
</div>
</body>
</html>
