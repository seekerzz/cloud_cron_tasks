with open('DEST_REPO/arxiv-daily/index.html', 'r', encoding='utf-8') as f:
    soup = BeautifulSoup(f, 'html.parser')

summaries = soup.find_all(class_='paper-summary')
for i, summary in enumerate(summaries):
    if i < len(chinese_summaries):
        summary.clear()
        summary.append(BeautifulSoup(chinese_summaries[i], 'html.parser'))

with open('DEST_REPO/arxiv-daily/index.html', 'w', encoding='utf-8') as f:
    f.write(str(soup))
