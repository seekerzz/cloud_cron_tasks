name: Auto Export FreshRSS to Target Repo

on:
  schedule:
    # 定时任务：每天北京时间凌晨2点执行（UTC时间18点）
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许网页端手动触发

jobs:
  export-and-sync:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取当前仓库代码
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 执行 FreshRSS 导出脚本
      - name: Run FreshRSS Script
        env:
          FRESHRSS_USERNAME: ${{ secrets.FRESHRSS_USERNAME }}
          FRESHRSS_PASSWORD: ${{ secrets.FRESHRSS_PASSWORD }}
        run: |
          echo "开始执行 FreshRSS 抓取脚本..."
          cd freshrss
          python freshrss_export_batch.py

      # 4. 将生成的 JSON 文件同步到目标仓库
      - name: Push JSON to Target Repository
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_GITHUB_TOKEN }}
          GITHUB_USER: ${{ secrets.GITHUB_USER }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: |
          # 配置 Git 机器人账号信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 清理可能存在的本地旧目录
          rm -rf DEST_REPO
          
          # 克隆目标仓库
          echo "正在克隆目标仓库 ${GITHUB_USER}/${GITHUB_REPO}..."
          git clone "https://${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git" DEST_REPO
          
          # ---------------------------------------------------------
          # 核心修改：删除目标目录下的旧 JSON 并复制新 JSON
          # ---------------------------------------------------------
          echo "清理 DEST_REPO 根目录下的旧 JSON 文件..."
          
          rm -f DEST_REPO/*.json
          
          # 【你的原始需求】：如果你确定要无差别删除，可以注释掉上面那行，取消下面这行的注释：
          # rm -f DEST_REPO/*.json
          
          echo "将新的 JSON 数据复制到 DEST_REPO..."
          cp freshrss/output/*.json DEST_REPO/
          
          # 进入目标仓库并提交推送
          cd DEST_REPO
          git add .
          
          # 检查是否有文件变更，如果没有则不提交
          if git diff --staged --quiet; then
            echo "没有新的数据变更，无需提交。"
          else
            git commit -m "Auto-sync FreshRSS json data: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ 成功推送到目标仓库！"
          fi
